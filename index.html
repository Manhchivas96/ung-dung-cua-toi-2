    <style>
        html, body {

            overscroll-behavior-y: none; /* Ngăn chặn triệt để tính năng vuốt xuống để làm mới (pull-to-refresh) trên điện thoại */
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Cấu hình hiển thị khi IN (Print) */
        @media print {
            @page { margin: 15mm; size: A4; }
            body { background-color: #fff; }
            .print-hidden { display: none !important; }
            .print-show { 
                position: static !important; 
                width: 100% !important; 
                opacity: 1 !important; 
                pointer-events: auto !important;
                left: 0 !important;
                display: block !important;
            }
        }
        /* Cấu hình văn bản hiển thị off-screen để xuất file PDF/Word */
        .export-area {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 210mm; /* A4 width */
            background: white;
            padding: 20mm;
            color: black;
            font-family: 'Times New Roman', serif;
        }
        /* Animation fade-in mượt mà */
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        // --- ERROR BOUNDARY (KHẮC PHỤC LỖI TRẮNG MÀN HÌNH) ---
        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error: error };
            }

            componentDidCatch(error, errorInfo) {
                console.error("React Error Boundary caught an error:", error, errorInfo);
            }

            handleReset = () => {
                if(window.confirm("Thao tác này sẽ xóa TOÀN BỘ bệnh án và tủ thuốc đang lưu trong máy để khôi phục ứng dụng. Bạn có chắc chắn?")) {
                    try {
                        localStorage.removeItem('yhct_records');
                        localStorage.removeItem('yhct_custom_remedies');
                    } catch(e) {}
                    window.location.reload();
                }
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                            <div className="bg-white p-8 rounded-lg shadow-lg max-w-md text-center border-t-4 border-red-500 animate-fadeIn">
                                <svg className="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                <h2 className="text-xl font-bold text-slate-800 mb-2">Đã xảy ra lỗi hệ thống!</h2>
                                <p className="text-sm text-slate-600 mb-6">Ứng dụng gặp sự cố (có thể do bộ nhớ đầy hoặc lỗi dữ liệu). Vui lòng thử tải lại trang. Nếu vẫn bị lỗi, hãy khôi phục cài đặt gốc.</p>
                                <div className="space-y-3">
                                    <button onClick={() => window.location.reload()} className="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium transition">Tải lại ứng dụng</button>

                            </div>
                        </div>
                    );

            }

        const CheckboxGroup = ({ label, options, selectedValues, onChange }) => {
            const handleToggle = (val) => {
                if (selectedValues.includes(val)) {
                    onChange(selectedValues.filter(v => v !== val));
                } else {
                    onChange([...selectedValues, val]);
                }
            };
            return (
                <div className="flex flex-col space-y-2 mb-4">
                    {label && <label className="text-sm font-semibold text-slate-800">{label}</label>}
                    <div className="flex flex-wrap gap-3">
                        {options.map((opt) => (
                            <label key={opt.value} className="flex items-center space-x-2 cursor-pointer group">
                                <input type="checkbox" checked={selectedValues.includes(opt.value)} onChange={() => handleToggle(opt.value)} className="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500" />
                                <span className="text-sm text-slate-700 group-hover:text-slate-900">{opt.label}</span>
                            </label>
                        ))}
                    </div>
                </div>
            );
        };

        const AutocompleteSearch = ({ label, placeholder, data, onSelect, iconName }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [showSuggestions, setShowSuggestions] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setShowSuggestions(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [wrapperRef]);

            const filtered = data.filter(item => {
                const textToSearch = typeof item === 'object' ? item.label : item;
                return textToSearch.toLowerCase().includes(searchTerm.toLowerCase());
            }).slice(0, 20);

            return (
                <div ref={wrapperRef} className="relative flex flex-col space-y-1">
                    {label && <label className="text-sm font-semibold text-slate-700">{label}</label>}
                    <div className="relative">
                        {iconName && <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><Icon name={iconName} size={16} /></div>}
                        <input
                            type="text"
                            className={`w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${iconName ? 'pl-9' : ''}`}
                            placeholder={placeholder}
                            value={searchTerm}
                            onChange={(e) => { setSearchTerm(e.target.value); setShowSuggestions(true); }}
                            onFocus={() => setShowSuggestions(true)}
                        />
                    </div>
                    {showSuggestions && searchTerm && filtered.length > 0 && (
                        <ul className="absolute z-50 w-full bg-white border border-slate-200 rounded-md shadow-lg max-h-60 overflow-y-auto mt-1 top-full left-0">
                            {filtered.map((item, idx) => (
                                <li
                                    key={idx}
                                    className="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm border-b last:border-b-0 text-slate-700"
                                    onMouseDown={(e) => {
                                        e.preventDefault();
                                        onSelect(item);
                                        setSearchTerm('');
                                        setShowSuggestions(false);
                                    }}
                                >
                                    {typeof item === 'object' ? item.label : item}
                                </li>
                            ))}
                        </ul>
                    )}
                </div>
            );
        };

        // --- ỨNG DỤNG CHÍNH ---
        function App() {
            const [activeTab, setActiveTab] = useState('hanhChinh');
            const [record, setRecord] = useState(initialRecordState);
            const [isSaveMenuOpen, setIsSaveMenuOpen] = useState(false);
            const [isExportingPDF, setIsExportingPDF] = useState(false);
            const saveMenuRef = useRef(null);

            // Các State phục vụ việc Quản lý nhiều bệnh án & Lưu tạm
            const [savedRecords, setSavedRecords] = useState(() => {
                try {
                    const stored = localStorage.getItem('yhct_records');
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        return Array.isArray(parsed) ? parsed : [];
                    }
                    return [];
                } catch (e) {
                    console.error("Data load error:", e);
                    return [];
                }
            });
            const [currentRecordId, setCurrentRecordId] = useState(null);
            const [isListMenuOpen, setIsListMenuOpen] = useState(false);
            const listMenuRef = useRef(null);
            const [toastMessage, setToastMessage] = useState('');
            const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

            // State phục vụ Tủ thuốc cá nhân
            const [customRemedies, setCustomRemedies] = useState(() => {
                try {
                    const stored = localStorage.getItem('yhct_custom_remedies');
                    if (stored) {
                        const parsed = JSON.parse(stored);
                        return Array.isArray(parsed) ? parsed : [];
                    }
                    return [];
                } catch (e) {
                    console.error("Data load error:", e);
                    return [];
                }
            });
            const [isCustomRemedyModalOpen, setIsCustomRemedyModalOpen] = useState(false);
            const [newRemedy, setNewRemedy] = useState({ name: '', phapTri: '', congThuc: '', thuThuat: '' });

            // Lưu vào bộ nhớ máy mỗi khi danh sách có sự thay đổi
            useEffect(() => {
                try {
                    localStorage.setItem('yhct_records', JSON.stringify(savedRecords));
                } catch (error) {
                    setToastMessage('Lỗi: Bộ nhớ đầy! Hãy xóa bớt bệnh án cũ hoặc ảnh Cận lâm sàng.');
                    setTimeout(() => setToastMessage(''), 5000);
                }
            }, [savedRecords]);

            // Lưu Tủ thuốc cá nhân
            useEffect(() => {
                try {
                    localStorage.setItem('yhct_custom_remedies', JSON.stringify(customRemedies));
                } catch (error) {
                    console.error("Local storage error:", error);
                }
            }, [customRemedies]);

            // Đóng menu danh sách bệnh án khi click ngoài
            useEffect(() => {
                const handleClickOutsideList = (event) => {
                    if (listMenuRef.current && !listMenuRef.current.contains(event.target)) {
                        setIsListMenuOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutsideList);
                return () => document.removeEventListener("mousedown", handleClickOutsideList);
            }, [listMenuRef]);

            const handleChange = (field, value) => {
                setRecord(prev => ({ ...prev, [field]: value }));
            };

            // Hàm tạo mới bệnh án
            const handleNewRecord = () => {
                setModalConfig({
                    isOpen: true,
                    title: 'Làm mới Bệnh án',
                    message: 'Bạn có chắc chắn muốn làm mới? Các dữ liệu chưa được "Lưu tạm" trên màn hình sẽ bị xóa.',
                    onConfirm: () => {
                        setRecord(initialRecordState);
                        setCurrentRecordId(null);
                        setActiveTab('hanhChinh');
                    }
                });
            };

            // Hàm lưu tạm bệnh án
            const handleSaveDraft = () => {
                const timestamp = new Date().toLocaleString('vi-VN');
                
                if (currentRecordId) {
                    // Cập nhật bệnh án đang mở
                    setSavedRecords(prev => prev.map(r => r.id === currentRecordId ? { ...record, id: currentRecordId, updatedAt: timestamp } : r));
                } else {
                    // Thêm mới
                    const newId = Date.now().toString();
                    const newRecord = { ...record, id: newId, updatedAt: timestamp };
                    setSavedRecords(prev => [...prev, newRecord]);
                    setCurrentRecordId(newId);
                }
                
                setToastMessage('Đã lưu bệnh án vào danh sách tạm!');
                setTimeout(() => setToastMessage(''), 3000);
            };

            // Hàm chọn bệnh án để chỉnh sửa
            const handleEditRecord = (rec) => {
                const safeRecord = { ...initialRecordState, ...rec }; // Đảm bảo dữ liệu cũ bị khuyết thuộc tính sẽ tự động bù đắp, ngăn lỗi trắng màn
                setRecord(safeRecord);
                setCurrentRecordId(rec.id);
                setIsListMenuOpen(false);
                setActiveTab('hanhChinh'); // Tự động chuyển về tab Hành chính để người dùng nhận diện ngay
                setToastMessage(`Đã mở bệnh án: ${rec.hoTen || 'Chưa có tên'}`);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // Hàm xóa bệnh án
            const confirmDeleteRecord = (e, id) => {
                e.stopPropagation(); // Tránh sự kiện kích hoạt vào thẻ cha (Mở chỉnh sửa)
                setModalConfig({
                    isOpen: true,
                    title: 'Xóa Bệnh án lưu tạm',
                    message: 'Bạn có chắc chắn muốn xóa vĩnh viễn bệnh án này khỏi danh sách?',
                    onConfirm: () => {
                        setSavedRecords(prev => prev.filter(r => r.id !== id));
                        if (currentRecordId === id) {
                            setRecord(initialRecordState);
                            setCurrentRecordId(null);
                        }
                        setToastMessage('Đã xóa bệnh án!');
                        setTimeout(() => setToastMessage(''), 3000);
                    }
                });
            };

            // Đóng menu lưu khi click ngoài
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (saveMenuRef.current && !saveMenuRef.current.contains(event.target)) {
                        setIsSaveMenuOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [saveMenuRef]);

            useEffect(() => {
                if (record.ngaySinh) {
                    const birthDate = new Date(record.ngaySinh);
                    const today = new Date();
                    let age = today.getFullYear() - birthDate.getFullYear();
                    const m = today.getMonth() - birthDate.getMonth();
                    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                        age--;
                    }
                    if (age >= 0 && age.toString() !== record.tuoi) {
                        setRecord(prev => ({ ...prev, tuoi: age.toString() }));
                    }
                }
            }, [record.ngaySinh]);

            useEffect(() => {
                if (record.canNang && record.chieuCao) {
                    const weight = parseFloat(record.canNang);
                    const heightInMeters = parseFloat(record.chieuCao) / 100;
                    if (weight > 0 && heightInMeters > 0) {
                        const bmiValue = (weight / (heightInMeters * heightInMeters)).toFixed(2);
                        if (bmiValue !== record.bmi) {
                            setRecord(prev => ({ ...prev, bmi: bmiValue }));
                        }
                    }
                } else if (record.bmi !== '') {
                    setRecord(prev => ({ ...prev, bmi: '' }));
                }
            }, [record.canNang, record.chieuCao]);

            // --- XỬ LÝ XUẤT FILE ---
            // Hàm hỗ trợ lưu file dùng Web Share API cho thiết bị di động (APK)
            const saveOrShareFile = async (blob, filename) => {
                if (navigator.share && navigator.canShare) {
                    const file = new File([blob], filename, { type: blob.type });
                    if (navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: filename,
                            });
                            return; // Thành công gọi hộp thoại Share/Lưu của Android
                        } catch (error) {
                            console.log('Share bị hủy hoặc lỗi', error);
                        }
                    }
                }
                
                // Fallback cho trình duyệt web trên máy tính
                const url = URL.createObjectURL(blob);
                const fileDownload = document.createElement("a");
                document.body.appendChild(fileDownload);
                fileDownload.href = url;
                fileDownload.download = filename;
                fileDownload.click();
                setTimeout(() => {
                    document.body.removeChild(fileDownload);
                    URL.revokeObjectURL(url);
                }, 100);
            };

            const handlePrint = () => {
                try {
                    window.print();
                } catch (e) {
                    setModalConfig({
                        isOpen: true,
                        title: 'Thông báo',
                        message: 'Tính năng in trực tiếp không được hỗ trợ trên thiết bị này. Vui lòng xuất file PDF để in.',
                        onConfirm: () => {}
                    });
                }
            };

            const exportToWord = () => {
                setIsSaveMenuOpen(false);
                const element = document.getElementById("printable-area");
                const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Benh An</title><style>body { font-family: 'Times New Roman', serif; line-height: 1.6; } h3 { border-bottom: 1px solid black; padding-bottom: 4px; }</style></head><body>";
                const footer = "</body></html>";
                const sourceHTML = header + element.innerHTML + footer;
                
                const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
                const filename = 'Benh_An_' + (record.hoTen || 'YHCT').replace(/\s+/g, '_') + '.doc';
                
                saveOrShareFile(blob, filename);
            };

            const exportToPDF = () => {
                setIsExportingPDF(true);
                setIsSaveMenuOpen(false);
                const element = document.getElementById('printable-area');
                const originalCssText = element.style.cssText;
                element.style.cssText = "position: absolute; left: 0; top: 0; width: 210mm; background: white; padding: 20mm; z-index: -9999; color: black; font-family: 'Times New Roman', serif;";
                
                // Giảm scale xuống 1.5 để tránh tràn bộ nhớ (Out of Memory) gây văng app trên điện thoại
                const opt = {
                    margin:       10,
                    filename:     'Benh_An_' + (record.hoTen || 'YHCT').replace(/\s+/g, '_') + '.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 1.5, useCORS: true, logging: false },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                // Sử dụng output('blob') thay vì .save() để tương thích với APK
                html2pdf().set(opt).from(element).output('blob').then((pdfBlob) => {
                    element.style.cssText = originalCssText;
                    saveOrShareFile(pdfBlob, opt.filename).then(() => {
                        setIsExportingPDF(false);
                    });
                }).catch(err => {
                    console.error("PDF Export error:", err);
                    element.style.cssText = originalCssText;
                    setIsExportingPDF(false);
                    setModalConfig({
                        isOpen: true,
                        title: 'Lỗi xuất PDF',
                        message: 'Trình duyệt hoặc ứng dụng không đủ bộ nhớ để xử lý xuất PDF.',
                        onConfirm: () => {}
                    });
                });
            };

            const renderHanhChinh = () => (
                <div className="space-y-6 animate-fadeIn">
                <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                    <h3 className="text-lg font-bold text-blue-800 mb-4 border-b pb-2">I. Thông tin Hành chính</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <Input label="1. Họ và tên (In hoa)" value={record.hoTen} onChange={(e) => handleChange('hoTen', e.target.value.toUpperCase())} />
                    <Input label="2. Ngày sinh" type="date" value={record.ngaySinh} onChange={(e) => handleChange('ngaySinh', e.target.value)} />
                    <Input label="Tuổi (Tự động tính)" value={record.tuoi} onChange={() => {}} className="opacity-70 bg-gray-50 pointer-events-none" />
                    
                    <div className="flex flex-col space-y-1">
                        <label className="text-sm font-semibold text-slate-700">3. Giới tính</label>
                        <select value={record.gioiTinh} onChange={(e) => handleChange('gioiTinh', e.target.value)} className="px-3 py-2 border border-slate-300 rounded-md text-sm bg-white">
                        <option value="1">Nam</option>
                        <option value="2">Nữ</option>
                        </select>
                    </div>
                    <Input label="4. Nghề nghiệp" value={record.ngheNghiep} onChange={(e) => handleChange('ngheNghiep', e.target.value)} />
                    <Input label="5. Dân tộc" value={record.danToc} onChange={(e) => handleChange('danToc', e.target.value)} />
                    
                    <div className="md:col-span-3">
                        <Input label="7. Địa chỉ hiện tại" value={record.diaChi} onChange={(e) => handleChange('diaChi', e.target.value)} placeholder="Số nhà, Thôn/Phố, Xã/Phường, Quận/Huyện, Tỉnh/TP" />
                    </div>
                    
                    <div className="flex flex-col space-y-1">
                        <label className="text-sm font-semibold text-slate-700">9. Đối tượng</label>
                        <select value={record.doiTuong} onChange={(e) => handleChange('doiTuong', e.target.value)} className="px-3 py-2 border border-slate-300 rounded-md text-sm bg-white">
                        <option value="1">BHYT</option>
                        <option value="2">Thu phí</option>
                        <option value="3">Miễn</option>
                        <option value="4">Khác</option>
                        </select>
                    </div>
                    <Input label="10. Số thẻ BHYT" value={record.soBHYT} onChange={(e) => handleChange('soBHYT', e.target.value)} />
                    <Input label="BHYT Giá trị đến ngày" type="date" value={record.bhytDenNgay} onChange={(e) => handleChange('bhytDenNgay', e.target.value)} />
                    
                    <div className="md:col-span-2">
                        <Input label="11. Người nhà khi cần báo tin" value={record.nguoiNha} onChange={(e) => handleChange('nguoiNha', e.target.value)} />
                    </div>
                    <Input label="Số điện thoại" value={record.dienThoai} onChange={(e) => handleChange('dienThoai', e.target.value)} />
                    </div>
                </div>

                <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200 mt-6">
                    <h3 className="text-lg font-bold text-blue-800 mb-4 border-b pb-2">II. Thông tin Nhập viện & Bệnh án</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="flex flex-col space-y-2">
                        <label className="text-sm font-semibold text-slate-700">1. Thời gian vào viện</label>
                        <input 
                            type="datetime-local" 
                            lang="en-GB"
                            value={(record.vaoVienNgay && record.vaoVienGio) ? `${record.vaoVienNgay}T${record.vaoVienGio}` : ''} 
                            onChange={(e) => {
                                const val = e.target.value;
                                if (val) {
                                    const [d, t] = val.split('T');
                                    setRecord(prev => ({ ...prev, vaoVienNgay: d, vaoVienGio: t }));
                                } else {
                                    setRecord(prev => ({ ...prev, vaoVienNgay: '', vaoVienGio: '' }));
                                }
                            }} 
                            className="px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white w-full" 
                        />
                    </div>
                    <div className="flex flex-col space-y-2">
                        <label className="text-sm font-semibold text-slate-700">2. Thời gian làm bệnh án</label>
                        <input 
                            type="datetime-local" 
                            lang="en-GB"
                            value={(record.ngayLamBenhAn && record.gioLamBenhAn) ? `${record.ngayLamBenhAn}T${record.gioLamBenhAn}` : ''} 
                            onChange={(e) => {
                                const val = e.target.value;
                                if (val) {
                                    const [d, t] = val.split('T');
                                    setRecord(prev => ({ ...prev, ngayLamBenhAn: d, gioLamBenhAn: t }));
                                } else {
                                    setRecord(prev => ({ ...prev, ngayLamBenhAn: '', gioLamBenhAn: '' }));
                                }
                            }} 
                            className="px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white w-full" 
                        />
                    </div>
                    </div>
                </div>
                </div>
            );

            const renderKhamBenh = () => (
                <div className="space-y-6 animate-fadeIn">
                <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                    <h3 className="text-lg font-bold text-blue-800 mb-4 border-b pb-2 flex items-center"><Icon name="Activity" size={20} className="mr-2"/> Lý do & Bệnh sử</h3>
                    <TextArea label="Lý do vào viện" value={record.trieuChung} onChange={(e) => handleChange('trieuChung', e.target.value)} rows={2} />
                    <TextArea label="Bệnh sử" value={record.benhSu} onChange={(e) => handleChange('benhSu', e.target.value)} rows={4} className="mt-4" />
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <TextArea label="Tiền sử bản thân" value={record.tienSuBanThan} onChange={(e) => handleChange('tienSuBanThan', e.target.value)} rows={2} />
                    <TextArea label="Tiền sử gia đình" value={record.tienSuGiaDinh} onChange={(e) => handleChange('tienSuGiaDinh', e.target.value)} rows={2} />
                    </div>
                </div>

                <div className="bg-white p-5 rounded-lg shadow-sm border border-slate-200">
                    <h3 className="text-lg font-bold text-blue-800 mb-4 border-b pb-2 flex items-center"><Icon name="Stethoscope" size={20} className="mr-2"/> Khám bộ phận (YHHĐ)</h3>
                    
                    <div className="grid grid-cols-2 md:grid-cols-6 gap-3 mb-6 bg-slate-50 p-4 rounded-md border border-slate-100">
                    <Input label="Mạch (l/p)" value={record.mach} onChange={(e) => handleChange('mach', e.target.value)} />
                    <Input label="Nhiệt độ (°C)" value={record.nhietDo} onChange={(e) => handleChange('nhietDo', e.target.value)} />
                    <Input label="Huyết áp (mmHg)" value={record.huyetAp} onChange={(e) => handleChange('huyetAp', e.target.value)} />
                    <Input label="Nhịp thở (l/p)" value={record.nhipTho} onChange={(e) => handleChange('nhipTho', e.target.value)} />
                    <Input label="Cân nặng (kg)" value={record.canNang} onChange={(e) => handleChange('canNang', e.target.value)} />
                    <Input label="Chiều cao (cm)" value={record.chieuCao} onChange={(e) => handleChange('chieuCao', e.target.value)} />
                    </div>
                    <div className="mb-6 w-full md:w-1/3">
                    <Input label="BMI (Tự động)" value={record.bmi} onChange={() => {}} className="opacity-70 bg-gray-50 pointer-events-none" />
                    </div>

                    <div className="space-y-4">
                    <TextArea label="1. Toàn thân (Ý thức, da niêm mạc, tuyến giáp...)" value={record.khamToanThan} onChange={(e) => handleChange('khamToanThan', e.target.value)} rows={2} />
                    <TextArea label="2. Tuần hoàn" value={record.khamTuanHoan} onChange={(e) => handleChange('khamTuanHoan', e.target.value)} rows={2} />
                    <TextArea label="3. Hô hấp" value={record.khamHoHap} onChange={(e) => handleChange('khamHoHap', e.target.value)} rows={2} />
                    <TextArea label="4. Tiêu hóa" value={record.khamTieuHoa} onChange={(e) => handleChange('khamTieuHoa', e.target.value)} rows={2} />
                    <TextArea label="5. Thận - Tiết niệu - Sinh dục" value={record.khamThanTietNieuSinhDuc} onChange={(e) => handleChange('khamThanTietNieuSinhDuc', e.target.value)} rows={2} />
                    <TextArea label="6. Thần kinh" value={record.khamThanKinh} onChange={(e) => handleChange('khamThanKinh', e.target.value)} rows={2} />
                    <TextArea label="7. Cơ xương khớp" value={record.khamCoXuongKhop} onChange={(e) => handleChange('khamCoXuongKhop', e.target.value)} rows={2} />
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <TextArea label="8. Tai - Mũi - Họng" value={record.khamTaiMuiHong} onChange={(e) => handleChange('khamTaiMuiHong', e.target.value)} rows={2} />
                        <TextArea label="9. Răng - Hàm - Mặt" value={record.khamRangHamMat} onChange={(e) => handleChange('khamRangHamMat', e.target.value)} rows={2} />
                        <TextArea label="10. Mắt" value={record.khamMat} onChange={(e) => handleChange('khamMat', e.target.value)} rows={2} />
                        <TextArea label="11. Nội tiết, dinh dưỡng" value={record.khamNoiTietDinhDuong} onChange={(e) => handleChange('khamNoiTietDinhDuong', e.target.value)} rows={2} />
                    </div>
                    </div>
                </div>
                </div>
            );

            const renderCLS_YHHĐ = () => {
                const toggleCLS = (cls) => {
                    const exists = record.clsItems && record.clsItems.find(item => item.name === cls);
                    if (exists) {
                        handleChange('clsItems', record.clsItems.filter(item => item.name !== cls));
                    } else {
                        const newItem = { id: Date.now() + Math.random(), name: cls, result: '', imageUrl: '' };
                        handleChange('clsItems', [...(record.clsItems || []), newItem]);
                    }
                };

                const handleClsItemChange = (id, field, value) => {
                    const newItems = record.clsItems.map(item => 
                        item.id === id ? { ...item, [field]: value } : item
                    );
                    handleChange('clsItems', newItems);
                };

                // FIX LỖI BASE64: Nén ảnh qua Canvas trước khi lưu vào State -> localStorage
                const handleClsImageUpload = (id, e) => {
                    const file = e.target.files[0];
                    if (file) {
                        if (file.size > 15 * 1024 * 1024) {
                            alert("Kích thước ảnh quá lớn. Vui lòng chọn ảnh nhỏ hơn 15MB để tránh quá tải bộ nhớ.");
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const img = new Image();
                            img.onload = () => {
                                try {
                                    const canvas = document.createElement('canvas');
                                    const MAX_WIDTH = 800; // Giới hạn chiều rộng ảnh
                                    let scaleSize = 1;
                                    
                                    if (img.width > MAX_WIDTH) {
                                        scaleSize = MAX_WIDTH / img.width;
                                    }
                                    
                                    canvas.width = img.width * scaleSize;
                                    canvas.height = img.height * scaleSize;
                                    
                                    const ctx = canvas.getContext('2d');
                                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                    
                                    // Nén dưới dạng JPEG với chất lượng 60%
                                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                                    handleClsItemChange(id, 'imageUrl', compressedBase64);
                                } catch (error) {
                                    console.error("Lỗi nén ảnh", error);
                                } finally {
                                    img.src = ''; // Giúp WebView giải phóng rác RAM nhanh hơn
                                }
                            }
                            img.onerror = () => console.error("Lỗi đọc ảnh");
                            img.src = event.target.result;
                        };
                        reader.onerror = () => console.error("Lỗi đọc file");
                        reader.readAsDataURL(file);
                    }
                };

                const handleCustomCLSAdd = () => {
                    const input = document.getElementById('customClsInput');
                    if (input && input.value.trim()) {
                        toggleCLS(input.value.trim());
                        input.value = '';
                    }
                };

                const handleDiseaseSelect = (selected) => {
                    if (selected && selected.ma !== '') {
                        setRecord(prev => ({ ...prev, cdYhhdBenhChinh: selected.yhhhd, cdYhhhdMa: selected.ma }));
                    }
                };

                const addMedicine = (selected) => {
                    if (!selected) return;
                    const newLine = `- ${selected.name} x ${selected.dose}`;
                    setRecord(prev => ({ ...prev, dieuTriCuTheYhhd: prev.dieuTriCuTheYhhd ? prev.dieuTriCuTheYhhd + '\n' + newLine : newLine }));
                };

                return (
                    <div className="space-y-6 animate-fadeIn">
                        <div className="bg-white p-5 rounded-lg shadow-sm border border-blue-200">
                        <h3 className="text-lg font-bold text-blue-800 mb-4 border-b border-blue-100 pb-2 flex items-center"><Icon name="FlaskConical" size={20} className="mr-2"/> Cận Lâm Sàng & Tóm Tắt</h3>
                        <div className="mb-4">
                            <label className="text-sm font-semibold text-slate-700 block mb-2">Chỉ định Cận lâm sàng nhanh:</label>
                            <div className="flex flex-wrap gap-2 mb-3">
                            {CLS_PRESETS.map((cls, idx) => (
                                <button
                                key={idx}
                                onClick={() => toggleCLS(cls)}
                                className={`px-3 py-1 text-xs rounded-full border transition-colors ${
                                    (record.clsItems || []).some(item => item.name === cls) ? 'bg-blue-100 border-blue-400 text-blue-800 font-medium' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'
                                }`}
                                >
                                {(record.clsItems || []).some(item => item.name === cls) ? <Icon name="Check" size={12} className="inline mr-1" /> : <Icon name="Plus" size={12} className="inline mr-1" />}
                                {cls.split(' (')[0]}
                                </button>
                            ))}
                            </div>
                            <div className="flex space-x-2 md:w-1/2">
                                <input id="customClsInput" type="text" placeholder="Thêm chỉ định khác (không có trong danh sách)..." className="px-3 py-2 border border-slate-300 rounded-md text-sm flex-1 focus:outline-none focus:ring-2 focus:ring-blue-500" onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); handleCustomCLSAdd(); } }}/>
                                <button type="button" onClick={handleCustomCLSAdd} className="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-md hover:bg-blue-100 text-sm font-medium transition-colors">Thêm</button>
                            </div>
                        </div>
                        
                        {(record.clsItems && record.clsItems.length > 0) && (
                            <div className="space-y-3 mb-6 bg-blue-50/30 p-4 rounded-lg border border-blue-100">
                                <label className="text-sm font-bold text-blue-900 block border-b border-blue-200 pb-2">Đánh kết quả & Đính kèm ảnh/QR Code (Đã tự động nén ảnh):</label>
                                {record.clsItems.map((item, idx) => (
                                    <div key={item.id} className="bg-white p-4 rounded-md border border-slate-200 shadow-sm flex flex-col space-y-3">
