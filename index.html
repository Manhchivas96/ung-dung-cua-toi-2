                                <h4 className="font-semibold text-emerald-900 mb-2">10. Đại, tiểu tiện</h4>
                                <CheckboxGroup label="- Tiểu tiện" options={[{label: 'Vàng', value: 'Vàng'}, {label: 'Đỏ', value: 'Đỏ'}, {label: 'Đục', value: 'Đục'}, {label: 'Buốt', value: 'Buốt'}, {label: 'Rắt', value: 'Rắt'}, {label: 'Không tự chủ', value: 'Không tự chủ'}, {label: 'Bí', value: 'Bí'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanTieuTien} onChange={(v) => handleChange('vanTieuTien', v)} />
                                <CheckboxGroup label="- Đại tiện" options={[{label: 'Táo', value: 'Táo'}, {label: 'Nát', value: 'Nát'}, {label: 'Sống', value: 'Sống'}, {label: 'Lỏng', value: 'Lỏng'}, {label: 'Nhầy mũi', value: 'Nhầy mũi'}, {label: 'Bí', value: 'Bí'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanDaiTien} onChange={(v) => handleChange('vanDaiTien', v)} />
                            </div>

                            <CheckboxGroup label="11. Ngủ" options={[{label: 'Khó vào giấc ngủ', value: 'Khó vào giấc ngủ'}, {label: 'Hay tỉnh', value: 'Hay tỉnh'}, {label: 'Hay mê', value: 'Hay mê'}, {label: 'Ngủ ít', value: 'Ngủ ít'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanNgu} onChange={(v) => handleChange('vanNgu', v)} />
                            
                            <div className="md:col-span-2">
                                <h4 className="font-semibold text-emerald-900 mb-2">12. Khả năng sinh dục-sinh sản</h4>
                                <CheckboxGroup label="12.1 Nam giới" options={[{label: 'Liệt dương', value: 'Liệt dương'}, {label: 'Di tinh', value: 'Di tinh'}, {label: 'Hoạt tinh', value: 'Hoạt tinh'}, {label: 'Mộng tinh', value: 'Mộng tinh'}, {label: 'Lãnh tinh', value: 'Lãnh tinh'}, {label: 'Mãn dục', value: 'Mãn dục'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanSinhDucNam} onChange={(v) => handleChange('vanSinhDucNam', v)} />
                                
                                <CheckboxGroup label="12.2 Nữ giới" options={[{label: 'Vô sinh', value: 'Vô sinh'}, {label: 'Động thai', value: 'Động thai'}, {label: 'Sảy thai', value: 'Sảy thai'}, {label: 'Sảy thai liên tiếp', value: 'Sảy thai liên tiếp'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanSinhDucNu} onChange={(v) => handleChange('vanSinhDucNu', v)} />
                                <CheckboxGroup label="- Rối loạn kinh nguyệt" options={[{label: 'Trước kỳ', value: 'Trước kỳ'}, {label: 'Sau kỳ', value: 'Sau kỳ'}, {label: 'Bế kinh', value: 'Bế kinh'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanKinhNguyet} onChange={(v) => handleChange('vanKinhNguyet', v)} />
                                <CheckboxGroup label="- Thống kinh" options={[{label: 'Trước kỳ', value: 'Trước kỳ'}, {label: 'Trong kỳ', value: 'Trong kỳ'}, {label: 'Sau kỳ', value: 'Sau kỳ'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanThongKinh} onChange={(v) => handleChange('vanThongKinh', v)} />
                                <CheckboxGroup label="- Đới hạ" options={[{label: 'Vàng', value: 'Vàng'}, {label: 'Trắng', value: 'Trắng'}, {label: 'Hồng', value: 'Hồng'}, {label: 'Hôi', value: 'Hôi'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.vanDoiHa} onChange={(v) => handleChange('vanDoiHa', v)} />
                            </div>

                            <CheckboxGroup label="13. Các yếu tố liên quan đến xuất hiện bệnh" options={[{label: 'Có', value: 'Có'}, {label: 'Không', value: 'Không'}]} selectedValues={record.vanYeuToLienQuan} onChange={(v) => handleChange('vanYeuToLienQuan', v)} />
                            <div className="md:col-span-2">
                                <TextArea label="14. Mô tả khác (Vấn chẩn)" value={record.vanDapMoTaKhac} onChange={(e) => handleChange('vanDapMoTaKhac', e.target.value)} rows={2} />
                            </div>
                        </div>
                    </div>
                </div>

                <div className="bg-white p-5 rounded-lg shadow-sm border border-emerald-200">
                    <h3 className="text-lg font-bold text-emerald-800 mb-4 border-b border-emerald-100 pb-2">IV. Thiết Chẩn (Bắt mạch, sờ nắn)</h3>
                    
                    <h4 className="font-semibold text-emerald-900 mb-2">1. Xúc chẩn</h4>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-orange-50 p-4 rounded-md border border-orange-100 mb-6">
                        <CheckboxGroup label="- Da" options={[{label: 'Khô', value: 'Khô'}, {label: 'Nóng', value: 'Nóng'}, {label: 'Lạnh', value: 'Lạnh'}, {label: 'Ướt', value: 'Ướt'}, {label: 'Chân tay nóng', value: 'Chân tay nóng'}, {label: 'Chân tay lạnh', value: 'Chân tay lạnh'}, {label: 'Ấn lõm', value: 'Ấn lõm'}, {label: 'Ấn đau', value: 'Ấn đau'}, {label: 'U/Cục', value: 'U/Cục'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.thietDa} onChange={(v) => handleChange('thietDa', v)} />
                        <CheckboxGroup label="- Cơ - xương - khớp" options={[{label: 'Mềm nhẽo', value: 'Mềm nhẽo'}, {label: 'Căng cứng', value: 'Căng cứng'}, {label: 'Ấn đau', value: 'Ấn đau'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.thietCoXuongKhop} onChange={(v) => handleChange('thietCoXuongKhop', v)} />
                        <CheckboxGroup label="- Bụng" options={[{label: 'Chướng', value: 'Chướng'}, {label: 'Tích', value: 'Tích'}, {label: 'Tụ', value: 'Tụ'}, {label: 'Thiện án', value: 'Thiện án'}, {label: 'Cự án', value: 'Cự án'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.thietBung} onChange={(v) => handleChange('thietBung', v)} />
                        <CheckboxGroup label="- Mồ hôi" options={[{label: 'Toàn thân', value: 'Toàn thân'}, {label: 'Trán', value: 'Trán'}, {label: 'Tay', value: 'Tay'}, {label: 'Chân', value: 'Chân'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.thietMoHoi} onChange={(v) => handleChange('thietMoHoi', v)} />
                    </div>

                    <h4 className="font-semibold text-emerald-900 mb-2">2. Mạch chẩn</h4>
                    <div className="bg-orange-50 p-4 rounded-md border border-orange-100">
                        <CheckboxGroup label="Mạch" options={[{label: 'Trầm', value: 'Trầm'}, {label: 'Trì', value: 'Trì'}, {label: 'Phù', value: 'Phù'}, {label: 'Sác', value: 'Sác'}, {label: 'Hoạt', value: 'Hoạt'}, {label: 'Huyền', value: 'Huyền'}, {label: 'Nhu', value: 'Nhu'}, {label: 'Khác', value: 'Khác'}]} selectedValues={record.machChan} onChange={(v) => handleChange('machChan', v)} />
                        
                        <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label className="text-sm font-semibold text-slate-800 block mb-2">- Tổng khán</label>
                                <Input label="Bên phải (Khí, dương)" value={record.machTongKhanPhai} onChange={(e) => handleChange('machTongKhanPhai', e.target.value)} className="mb-2" />
                                <Input label="Bên trái (Huyết, âm)" value={record.machTongKhanTrai} onChange={(e) => handleChange('machTongKhanTrai', e.target.value)} />
                            </div>
                            <div>
                                <label className="text-sm font-semibold text-slate-800 block mb-2">- Vi khán (Mạch tay trái)</label>
                                <div className="grid grid-cols-3 gap-2 mb-4">
                                    <Input placeholder="Thốn" value={record.machTraiThon} onChange={(e) => handleChange('machTraiThon', e.target.value)} />
                                    <Input placeholder="Quan" value={record.machTraiQuan} onChange={(e) => handleChange('machTraiQuan', e.target.value)} />
                                    <Input placeholder="Xích" value={record.machTraiXich} onChange={(e) => handleChange('machTraiXich', e.target.value)} />
                                </div>
                                <label className="text-sm font-semibold text-slate-800 block mb-2">- Vi khán (Mạch tay phải)</label>
                                <div className="grid grid-cols-3 gap-2">
                                    <Input placeholder="Thốn" value={record.machPhaiThon} onChange={(e) => handleChange('machPhaiThon', e.target.value)} />
                                    <Input placeholder="Quan" value={record.machPhaiQuan} onChange={(e) => handleChange('machPhaiQuan', e.target.value)} />
                                    <Input placeholder="Xích" value={record.machPhaiXich} onChange={(e) => handleChange('machPhaiXich', e.target.value)} />
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <TextArea label="3. Mô tả khác (Thiết chẩn)" value={record.thietMoTaKhac} onChange={(e) => handleChange('thietMoTaKhac', e.target.value)} rows={2} className="mt-4" />
                </div>
                </div>
            );

            const renderCĐ_ĐT_YHCT = () => {
                const handlePrescriptionSelect = (selected) => {
                    if (selected) {
                        setRecord(prev => ({
                        ...prev,
                        phapDieuTri: selected.phapTri,
                        phuongDuoc: selected.name + '\n' + selected.congThuc,
                        phuongPhapKhac: selected.thuThuat ? selected.thuThuat : prev.phuongPhapKhac
                        }));
                    }
                };

                const handleYHCTDiseaseSelect = (selected) => {
                    handleChange('cdYhctBenhChinh', selected.label || selected);
                };

                return (
                    <div className="space-y-6 animate-fadeIn">
                        <div className="bg-white p-5 rounded-lg shadow-sm border border-emerald-200">
                        <h3 className="text-lg font-bold text-emerald-800 mb-4 border-b border-emerald-100 pb-2">Tóm tắt tứ chẩn & Biện chứng luận trị</h3>
                        <div className="space-y-4">
                            <TextArea label="Tóm tắt tứ chẩn" value={record.tomTatTuChan} onChange={(e) => handleChange('tomTatTuChan', e.target.value)} rows={4} placeholder="Tóm tắt các triệu chứng qua Vọng, Văn, Vấn, Thiết..." />
                            <TextArea label="Biện chứng luận trị" value={record.bienChungLuanTri} onChange={(e) => handleChange('bienChungLuanTri', e.target.value)} rows={4} placeholder="Lý luận để đưa ra chẩn đoán và phương pháp điều trị..." />
                        </div>
                        </div>

                        <div className="bg-white p-5 rounded-lg shadow-sm border border-emerald-200">
                        <h3 className="text-lg font-bold text-emerald-800 mb-4 border-b border-emerald-100 pb-2">Chẩn Đoán Y Học Cổ Truyền</h3>
                        
                        <div className="space-y-4">
                            <div className="border border-emerald-300 rounded-md overflow-hidden bg-white shadow-sm focus-within:ring-2 focus-within:ring-emerald-500 transition-shadow">
                            <div className="bg-emerald-50 border-b border-emerald-200 p-3">
                                <h4 className="text-sm font-bold text-emerald-900 mb-2">Bệnh danh YHCT (Bệnh chính) - Điền nhanh:</h4>
                                <AutocompleteSearch
                                placeholder="Tra cứu Bệnh danh (Ví dụ: Yêu thống, Khái thấu, Vị quản thống...)"
                                data={BENH_DANH_YHCT_PRESETS}
                                onSelect={handleYHCTDiseaseSelect}
                                iconName="Search"
                                />
                            </div>
                            <div className="p-3">
                                <textarea
                                value={record.cdYhctBenhChinh}
                                onChange={(e) => handleChange('cdYhctBenhChinh', e.target.value)}
                                rows={2}
                                placeholder="Gõ trực tiếp hoặc sử dụng thanh tìm kiếm phía trên..."
                                className="w-full text-sm focus:outline-none resize-y"
                                />
                            </div>
                            </div>

                            <TextArea label="Bệnh kèm theo (YHCT)" value={record.cdYhctBenhKem} onChange={(e) => handleChange('cdYhctBenhKem', e.target.value)} rows={2} />
                            
                            <div className="bg-slate-50 p-3 rounded border border-slate-200 mt-2">
                            <CheckboxGroup label="Bát cương" options={[{label: 'Biểu', value: 'Biểu'}, {label: 'Lý', value: 'Lý'}, {label: 'Hư', value: 'Hư'}, {label: 'Thực', value: 'Thực'}, {label: 'Hàn', value: 'Hàn'}, {label: 'Nhiệt', value: 'Nhiệt'}, {label: 'Âm', value: 'Âm'}, {label: 'Dương', value: 'Dương'}]} selectedValues={record.batCuong} onChange={(v) => handleChange('batCuong', v)} />
                            <CheckboxGroup label="Tạng phủ" options={[{label: 'Tâm', value: 'Tâm'}, {label: 'Can', value: 'Can'}, {label: 'Tỳ', value: 'Tỳ'}, {label: 'Phế', value: 'Phế'}, {label: 'Thận', value: 'Thận'}]} selectedValues={record.tangPhu} onChange={(v) => handleChange('tangPhu', v)} />
                            <CheckboxGroup label="Nguyên nhân" options={[{label: 'Nội nhân', value: 'Nội nhân'}, {label: 'Ngoại nhân', value: 'Ngoại nhân'}, {label: 'Bất nội ngoại nhân', value: 'Bất nội ngoại nhân'}]} selectedValues={record.nguyenNhan} onChange={(v) => handleChange('nguyenNhan', v)} />
                            </div>
                        </div>
                        </div>

                        <div className="bg-white p-5 rounded-lg shadow-sm border border-emerald-200">
                        <h3 className="text-lg font-bold text-emerald-800 mb-4 border-b border-emerald-100 pb-2">Điều Trị Y Học Cổ Truyền</h3>
                        <div className="space-y-4">
                            <Input label="Pháp điều trị" value={record.phapDieuTri} onChange={(e) => handleChange('phapDieuTri', e.target.value)} placeholder="Vd: Hành khí hoạt huyết, khu phong tán hàn..." />
                            
                            <div className="border border-emerald-300 rounded-md overflow-hidden bg-white shadow-sm focus-within:ring-2 focus-within:ring-emerald-500 transition-shadow">
                            <div className="bg-emerald-50 border-b border-emerald-200 p-3">
                                <div className="flex justify-between items-center mb-2">
                                    <h4 className="text-sm font-bold text-emerald-900">Phương dược (Tích hợp thư viện & Cá nhân):</h4>
                                    <button 
                                        onClick={() => setIsCustomRemedyModalOpen(true)}
                                        className="flex items-center px-2 py-1 bg-emerald-200 text-emerald-800 hover:bg-emerald-300 border border-emerald-300 rounded text-xs font-medium transition-colors"
                                    >
                                        <Icon name="Plus" size={14} className="mr-1"/> Tủ thuốc cá nhân
                                    </button>
                                </div>
                                <AutocompleteSearch
                                placeholder="Tra cứu bài thuốc hoặc thể bệnh..."
                                data={[...BAI_THUOC_CO_PHUONG, ...customRemedies]}
                                onSelect={handlePrescriptionSelect}
                                iconName="Search"
                                />
                            </div>
                            <div className="p-3">
                                <textarea
                                value={record.phuongDuoc}
                                onChange={(e) => handleChange('phuongDuoc', e.target.value)}
                                rows={6}
                                placeholder="Gõ trực tiếp hoặc sử dụng thanh tìm kiếm phía trên để tự tự động điền Pháp trị, Phương dược và Phương pháp khác..."
                                className="w-full text-sm focus:outline-none resize-y"
                                />
                            </div>
                            </div>

                            <TextArea label="Phương pháp điều trị không dùng thuốc (Châm cứu, xoa bóp...)" value={record.phuongPhapKhac} onChange={(e) => handleChange('phuongPhapKhac', e.target.value)} rows={3} placeholder="Ví dụ: Điện châm các huyệt Giáp tích L3-L5, Đại trường du..." />
                        </div>
                        </div>

                        <div className="bg-white p-5 rounded-lg shadow-sm border border-emerald-200">
                        <h3 className="text-lg font-bold text-emerald-800 mb-4 border-b border-emerald-100 pb-2">Tiên lượng & Dự hậu</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <TextArea label="Tiên lượng" value={record.tienLuongYhct || ''} onChange={(e) => handleChange('tienLuongYhct', e.target.value)} rows={3} placeholder="Tiên lượng khả năng phục hồi theo YHCT..." />
                            <TextArea label="Dự hậu" value={record.duHauYhct || ''} onChange={(e) => handleChange('duHauYhct', e.target.value)} rows={3} placeholder="Lời khuyên dưỡng sinh, ăn uống, kiêng kỵ..." />
                        </div>
                        </div>
                    </div>
                );
            };

            const tabs = [
                { id: 'hanhChinh', label: '1. Hành chính', iconName: 'User' },
                { id: 'khamBenh', label: '2. Khám YHHĐ', iconName: 'Activity' },
                { id: 'clsYhhd', label: '3. CLS & ĐT YHHĐ', iconName: 'Pill' },
                { id: 'khamYhct', label: '4. Khám YHCT', iconName: 'Leaf' },
                { id: 'cdDtYhct', label: '5. CĐ & ĐT YHCT', iconName: 'Stethoscope' },
            ];

            return (
                <div className="min-h-screen font-sans">
                    {/* KHU VỰC ỨNG DỤNG LÀM VIỆC (SẼ ẨN KHI IN) */}
                    <div className="print-hidden pb-20">
                        <div className="bg-white shadow-md sticky top-0 z-20 border-b border-emerald-600">
                            <div className="max-w-6xl mx-auto px-4">
                                <div className="flex items-center justify-between py-3">
                                    <div className="flex items-center space-x-3">
                                        <div className="bg-emerald-600 text-white p-2 rounded-lg"><Icon name="Leaf" size={24} /></div>
                                        <h1 className="text-xl font-bold text-emerald-800 uppercase tracking-wide hidden sm:block">Bệnh Án Điện Tử YHCT</h1>
                                    </div>
                                    <div className="flex flex-wrap gap-2 justify-end relative">
                                        
                                        {/* Nút Danh sách */}
                                        <div ref={listMenuRef} className="relative">
                                            <button onClick={() => setIsListMenuOpen(!isListMenuOpen)} className="flex items-center px-3 py-2 bg-amber-50 text-amber-700 rounded-md hover:bg-amber-100 transition shadow-sm font-medium text-sm">
                                                <Icon name="List" size={16} className="mr-1 md:mr-2"/> <span className="hidden md:inline">Danh sách</span> ({savedRecords.length})
                                            </button>
                                            {isListMenuOpen && (
                                                <div className="absolute right-0 mt-2 w-72 bg-white border border-slate-200 rounded-md shadow-lg z-50 overflow-hidden max-h-96 overflow-y-auto">
                                                    {savedRecords.length === 0 ? (
                                                        <div className="p-4 text-center text-sm text-slate-500">Chưa có bệnh án lưu tạm</div>
                                                    ) : (
                                                        <>
                                                            {savedRecords.map(rec => (
                                                                <div key={rec.id} className="p-3 border-b border-slate-100 hover:bg-slate-50 cursor-pointer flex justify-between items-center">
                                                                    <div className="flex-1" onClick={() => handleEditRecord(rec)}>
                                                                        <div className="font-semibold text-sm text-slate-800">{rec.hoTen || 'Chưa có tên'}</div>
                                                                        <div className="text-xs text-slate-500 mt-1">{rec.updatedAt}</div>
                                                                    </div>
                                                                    <div className="flex space-x-1 ml-2">
                                                                        <button onClick={() => handleEditRecord(rec)} className="text-blue-600 hover:bg-blue-50 px-2 py-1.5 rounded transition-colors text-xs font-medium border border-blue-200" title="Mở bệnh án này">
                                                                            Mở
                                                                        </button>
                                                                        <button onClick={(e) => confirmDeleteRecord(e, rec.id)} className="text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors border border-red-200" title="Xóa">
                                                                            <Icon name="Trash2" size={14} />
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                            
                                                            {/* Nút Khôi phục nằm dưới cùng danh sách */}
                                                            <div className="p-3 bg-red-50 border-t border-red-100 mt-2">
                                                                <button 
                                                                    onClick={() => {
                                                                        setModalConfig({
                                                                            isOpen: true,
                                                                            title: 'Dọn dẹp bộ nhớ',
                                                                            message: 'CẢNH BÁO: Thao tác này sẽ XÓA TOÀN BỘ bệnh án đang lưu trong danh sách để dọn dẹp. Bạn có chắc chắn không?',
                                                                            onConfirm: () => {
                                                                                try { localStorage.removeItem('yhct_records'); } catch(e){}
                                                                                setSavedRecords([]);
                                                                                setRecord(initialRecordState);
                                                                                setCurrentRecordId(null);
                                                                                setIsListMenuOpen(false);
                                                                            }
                                                                        });
                                                                    }} 
                                                                    className="w-full py-2 flex items-center justify-center bg-red-100 text-red-600 rounded hover:bg-red-200 transition-colors text-xs font-bold border border-red-200"
                                                                >
                                                                    <Icon name="Trash2" size={14} className="mr-1" /> Xóa tất cả dữ liệu (Dọn rác)
                                                                </button>
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        {/* Nút Làm mới */}
                                        <button onClick={handleNewRecord} className="flex items-center px-3 py-2 bg-slate-100 text-slate-700 rounded-md hover:bg-slate-200 transition shadow-sm font-medium text-sm">
                                            <Icon name="RefreshCw" size={16} className="mr-1 md:mr-2"/> <span className="hidden md:inline">Làm mới</span>
                                        </button>

                                        {/* Nút Lưu Tạm */}
                                        <button onClick={handleSaveDraft} className="flex items-center px-3 py-2 bg-indigo-50 text-indigo-700 rounded-md hover:bg-indigo-100 transition shadow-sm font-medium text-sm">
                                            <Icon name="Archive" size={16} className="mr-1 md:mr-2"/> <span className="hidden md:inline">Lưu tạm</span>
                                        </button>

                                        {/* Nút In */}
                                        <button onClick={handlePrint} className="flex items-center px-3 py-2 bg-blue-50 text-blue-700 rounded-md hover:bg-blue-100 transition shadow-sm font-medium text-sm">
                                            <Icon name="Printer" size={16} className="mr-1 md:mr-2"/> <span className="hidden lg:inline">In BA</span>
                                        </button>
                                        
                                        {/* Nút & Menu Lưu */}
                                        <div ref={saveMenuRef} className="relative">
                                            <button 
                                                onClick={() => setIsSaveMenuOpen(!isSaveMenuOpen)} 
                                                disabled={isExportingPDF}
                                                className="flex items-center px-3 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 transition shadow-sm font-medium text-sm disabled:opacity-75 disabled:cursor-wait"
                                            >
                                                <Icon name="Save" size={16} className="mr-1 md:mr-2"/> 
                                                <span className="hidden md:inline">{isExportingPDF ? 'Đang xuất...' : 'Xuất File'}</span>
                                                {!isExportingPDF && <Icon name="ChevronDown" size={16} className="ml-1"/>}
                                            </button>
                                            
                                            {isSaveMenuOpen && !isExportingPDF && (
                                                <div className="absolute right-0 mt-2 w-48 bg-white border border-slate-200 rounded-md shadow-lg z-50 overflow-hidden">
                                                    <button onClick={exportToWord} className="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 hover:text-blue-600 flex items-center border-b border-slate-100">
                                                        <Icon name="FileText" size={16} className="mr-2" /> Tải về dạng Word (.doc)
                                                    </button>
                                                    <button onClick={exportToPDF} className="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 hover:text-red-600 flex items-center">
                                                        <Icon name="FileText" size={16} className="mr-2" /> Tải về dạng PDF (.pdf)
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex overflow-x-auto hide-scrollbar border-t border-slate-100">
                                    {tabs.map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center px-5 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap ${
                                            activeTab === tab.id ? 'border-emerald-600 text-emerald-700 bg-emerald-50/50' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'
                                        }`}
                                    >
                                        <Icon name={tab.iconName} size={18} className="mr-2"/>
                                        {tab.label}
                                    </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="max-w-6xl mx-auto p-4 md:p-6">
                            {activeTab === 'hanhChinh' && renderHanhChinh()}
                            {activeTab === 'khamBenh' && renderKhamBenh()}
                            {activeTab === 'clsYhhd' && renderCLS_YHHĐ()}
                            {activeTab === 'khamYhct' && renderKhamYHCT()}
                            {activeTab === 'cdDtYhct' && renderCĐ_ĐT_YHCT()}
                        </div>
                    </div>

                    {/* KHU VỰC ẨN ĐỂ IN VÀ XUẤT FILE (RENDER TOÀN BỘ) */}
                    <PrintableView record={record} />

                    {/* HIỂN THỊ THÔNG BÁO (TOAST) */}
                    {toastMessage && (
                        <div className="fixed bottom-4 right-4 z-[100] bg-emerald-600 text-white px-4 py-3 rounded shadow-lg flex items-center animate-fadeIn text-sm font-medium">
                            <Icon name="Check" size={18} className="mr-2"/> {toastMessage}
                        </div>
                    )}

                    {/* HIỂN THỊ HỘP THOẠI XÁC NHẬN (MODAL) */}
                    {modalConfig.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 px-4">
                            <div className="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl animate-fadeIn">
                                <h3 className="text-lg font-bold text-slate-800 mb-2">{modalConfig.title}</h3>
                                <p className="text-sm text-slate-600 mb-6">{modalConfig.message}</p>
                                <div className="flex justify-end space-x-3">
                                    <button onClick={() => setModalConfig({ ...modalConfig, isOpen: false })} className="px-4 py-2 bg-slate-100 text-slate-700 rounded hover:bg-slate-200 text-sm font-medium transition-colors">Hủy</button>
                                    <button onClick={() => { modalConfig.onConfirm(); setModalConfig({ ...modalConfig, isOpen: false }); }} className="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 text-sm font-medium transition-colors">Đồng ý</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL TỦ THUỐC CÁ NHÂN */}
                    {isCustomRemedyModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 px-4">
                            <div className="bg-white rounded-lg p-6 max-w-md w-full shadow-xl animate-fadeIn max-h-[90vh] flex flex-col">
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="text-lg font-bold text-emerald-800 flex items-center"><Icon name="Archive" size={20} className="mr-2" /> Tủ Thuốc Cá Nhân</h3>
                                    <button onClick={() => setIsCustomRemedyModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                                        <Icon name="Plus" size={24} className="transform rotate-45" />
                                    </button>
                                </div>
                                
                                <div className="overflow-y-auto flex-1 pr-1 space-y-4 hide-scrollbar">
                                    <div className="bg-emerald-50 p-4 rounded-md border border-emerald-100 space-y-3">
                                        <h4 className="text-sm font-bold text-emerald-900">Thêm bài thuốc mới</h4>
                                        <Input label="Tên bài thuốc (*)" value={newRemedy.name} onChange={e => setNewRemedy({...newRemedy, name: e.target.value})} placeholder="Vd: Bài thuốc gia truyền..." />
                                        <Input label="Pháp trị" value={newRemedy.phapTri} onChange={e => setNewRemedy({...newRemedy, phapTri: e.target.value})} placeholder="Vd: Khu phong, tán hàn..." />
                                        <TextArea label="Phương dược / Công thức (*)" value={newRemedy.congThuc} onChange={e => setNewRemedy({...newRemedy, congThuc: e.target.value})} rows={3} placeholder="Chi tiết các vị thuốc..." />
                                        <TextArea label="Phương pháp khác (Châm cứu, xoa bóp...)" value={newRemedy.thuThuat} onChange={e => setNewRemedy({...newRemedy, thuThuat: e.target.value})} rows={2} />
                                        
                                        <div className="flex justify-end mt-2">
                                            <button onClick={() => {
                                                if (!newRemedy.name || !newRemedy.congThuc) {
                                                    setToastMessage('Vui lòng nhập Tên bài thuốc và Công thức!');
                                                    setTimeout(() => setToastMessage(''), 3000);
                                                    return;
                                                }
                                                const remedyToAdd = {
                                                    label: `[Cá nhân] ${newRemedy.name}`,
                                                    name: newRemedy.name,
                                                    phapTri: newRemedy.phapTri,
                                                    congThuc: newRemedy.congThuc,
                                                    thuThuat: newRemedy.thuThuat
                                                };
                                                setCustomRemedies([...customRemedies, remedyToAdd]);
                                                setNewRemedy({ name: '', phapTri: '', congThuc: '', thuThuat: '' });
                                                setToastMessage('Đã thêm vào Tủ thuốc cá nhân!');
                                                setTimeout(() => setToastMessage(''), 3000);
                                            }} className="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 text-sm font-medium transition-colors w-full">Lưu vào Tủ Thuốc</button>
                                        </div>
                                    </div>

                                    {customRemedies.length > 0 && (
                                        <div className="mt-4">
                                            <h4 className="text-sm font-semibold text-slate-700 mb-2">Danh sách bài thuốc cá nhân ({customRemedies.length}):</h4>
                                            <ul className="space-y-2">
                                                {customRemedies.map((r, idx) => (
                                                    <li key={idx} className="flex justify-between items-center bg-white p-3 rounded-md text-sm border border-slate-200 shadow-sm">
                                                        <div className="flex-1 min-w-0 pr-2">
                                                            <div className="font-bold text-emerald-800 truncate">{r.name}</div>
                                                            <div className="text-xs text-slate-500 line-clamp-2 mt-1 whitespace-pre-wrap">{r.congThuc}</div>
                                                        </div>
                                                        <button onClick={() => {
                                                            setModalConfig({
                                                                isOpen: true,
                                                                title: 'Xóa Bài Thuốc Cá Nhân',
                                                                message: `Bạn có chắc chắn muốn xóa bài thuốc "${r.name}" khỏi tủ thuốc cá nhân?`,
                                                                onConfirm: () => {
                                                                    setCustomRemedies(customRemedies.filter((_, i) => i !== idx));
                                                                    setToastMessage('Đã xóa bài thuốc!');
                                                                    setTimeout(() => setToastMessage(''), 3000);
                                                                }
                                                            });
                                                        }} className="text-red-500 hover:text-red-700 flex-shrink-0 bg-red-50 p-1.5 rounded border border-red-100 transition-colors">
                                                            <Icon name="Trash2" size={16} />
                                                        </button>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
